<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paste Test</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #editor { border: 1px solid #ccc; min-height: 200px; padding: 10px; margin-top: 10px; }
    #output { white-space: pre-wrap; font-family: monospace; background: #eee; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Paste here:</h1>
  <div id="editor" contenteditable="true"></div>
  <h2>HTML source of pasted content:</h2>
  <div id="output"></div>
  <script>
    const ed = document.getElementById('editor');
    const out = document.getElementById('output');
    ed.addEventListener('input', () => {
      out.textContent = ed.innerHTML;
    });
  </script>
</body>
</html>
